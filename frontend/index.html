<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Government Scheme Navigator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <header class="site-header">
    <button type="button" id="menu-toggle" class="menu-toggle" aria-label="Toggle menu">☰</button>
    <span class="seal">◎</span>
    <h1>Government Scheme &amp; Financial Inclusion Navigator</h1>
  </header>

  <div class="app">
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <aside id="profile-panel" class="profile-panel">
      <div class="passbook-label">Passbook</div>
      <div id="profile-fields" class="passbook-entries"></div>
    </aside>

    <main class="chat-panel">
      <div id="chat-window" class="chat-window">
        <div id="empty-state" class="empty-state">
          Ask me about government schemes you may qualify for —
          try typing something like "I'm a farmer in Karnataka with 2 acres",
          or use voice input below.
        </div>
      </div>

      <div id="language-selector" class="language-selector">
        <button type="button" class="lang-btn" data-lang="hi">हिन्दी</button>
        <button type="button" class="lang-btn" data-lang="te">తెలుగు</button>
        <button type="button" class="lang-btn" data-lang="ta">தமிழ்</button>
        <button type="button" class="lang-btn" data-lang="kn">ಕನ್ನಡ</button>
        <button type="button" class="lang-btn" data-lang="ml">മലയാളം</button>
        <button type="button" class="lang-btn" data-lang="mr">मराठी</button>
        <button type="button" class="lang-btn" data-lang="en">English</button>
        <button type="button" class="lang-btn active" data-lang="">🌐 Auto</button>
      </div>

      <form id="chat-form" class="chat-form">
        <input id="chat-input" type="text" placeholder="Type your message..." autocomplete="off" />
        <button type="button" id="mic-btn" title="Record voice message">🎙️</button>
        <button type="submit">Send</button>
      </form>
    </main>
  </div>

  <script type="module" src="js/app.js"></script>
</body>

</html>
